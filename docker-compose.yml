services:
  postgres:
    container_name: app-db
    image: postgres:14.1
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=docker
      - POSTGRES_DB=postgres
    ports:
      - '5432:5432'
    restart: on-failure
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - database-network

  application:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: application
    ports:
      - "8080:8080"
    restart: on-failure
    depends_on:
      - postgres


networks:
  database-network:
    driver: bridge

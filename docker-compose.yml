services:
  postgres:
    container_name: app-db
    image: postgres:14.1
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=docker
      - POSTGRES_DB=postgres
    ports:
      - '5432:5432'
    restart: on-failure
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - database-network

  backend:
    build:
      context: ./backend/airplane
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "8080:8080"
    restart: on-failure
    depends_on:
      - postgres


  frontend:
    build:
      context: ./frontend/flightplanner
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
  database-network:
    driver: bridge
